<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IranBound | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                        url('https://images.pexels.com/photos/2288917/pexels-photo-2288917.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            backdrop-filter: brightness(0.9);
        }

        /* برای عکس دلخواه خودتان، مسیر بالا را تغییر دهید */

        .overlay {
            background-color: rgba(0, 0, 0, 0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .content {
            max-width: 850px;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 1s ease-out;
        }

        h1 {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .highlight {
            color: #ffd966;
            font-weight: 800;
            display: inline-block;
        }

        .tagline {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 1rem;
            opacity: 0.95;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: #ffd966;
            margin: 1.5rem auto;
            border-radius: 4px;
        }

        .subtext {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .persian-spirit {
            font-size: 1rem;
            margin-top: 2rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 1.5rem;
            display: inline-block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* موبایل */
        @media (max-width: 700px) {
            h1 {
                font-size: 2.4rem;
            }
            .tagline {
                font-size: 1.2rem;
            }
            .subtext {
                font-size: 1rem;
            }
            .content {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="content">
            <h1>
                <span class="highlight">IRAN</span>BOUND
            </h1>
            <div class="tagline">Where Persia meets your journey</div>
            <div class="divider"></div>
            <div class="subtext">
                A new gateway for cultural & medical travel to Iran is almost ready.<br>
                Authentic experiences, trusted healthcare, and timeless hospitality.
            </div>
            <div class="persian-spirit">
                ✧ Coming Soon — The art of Persian travel ✧
            </div>
        </div>
    </div>
</body>
</html>
